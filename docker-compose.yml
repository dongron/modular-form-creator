services:
  frontend:
    image: node:24-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://backend:5001"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules
    command: /bin/sh -c "npm ci && npm run dev"
    depends_on:
      - backend
    develop:
      watch:
        - action: restart
          path: .
          ignore:
            - backend/
            - node_modules/
            - dist/
  backend:
    build: ./backend
    container_name: modular-form-creator-backend
    ports:
      - "5001:5001"
    environment:
      PORT: "5001"
      MONGO_URI: "mongodb://mongo:27017/modular_form_creator"
      CORS_ORIGIN: "http://localhost:5173"
    depends_on:
      - mongo
  mongo:
    image: mongo:7
    container_name: modular-form-creator-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
  frontend_node_modules:
